<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 650" role="img" aria-labelledby="title desc">
  <title id="title">Canasta de productos del supermercado</title>
  <desc id="desc">Ilustración de frutas, vegetales, pan y abarrotes sobre un fondo verde claro.</desc>
  <defs>
    <linearGradient id="back" x1="80" y1="35" x2="690" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#edf5d9"/>
      <stop offset=".55" stop-color="#d7ead8"/>
      <stop offset="1" stop-color="#b7d8c2"/>
    </linearGradient>
    <linearGradient id="basket" x1="271" y1="345" x2="470" y2="602" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c58e45"/>
      <stop offset="1" stop-color="#8d5c29"/>
    </linearGradient>
    <linearGradient id="bag" x1="500" y1="265" x2="655" y2="545" gradientUnits="userSpaceOnUse">
      <stop stop-color="#faf5e7"/>
      <stop offset="1" stop-color="#e9dfc9"/>
    </linearGradient>
    <radialGradient id="tomato" cx="35%" cy="28%" r="70%">
      <stop stop-color="#ff7b62"/>
      <stop offset="1" stop-color="#d83f31"/>
    </radialGradient>
    <radialGradient id="orange" cx="34%" cy="28%" r="70%">
      <stop stop-color="#ffcf55"/>
      <stop offset="1" stop-color="#e99122"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#174430" flood-opacity=".2"/>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#174430" flood-opacity=".15"/>
    </filter>
    <pattern id="weave" width="28" height="20" patternUnits="userSpaceOnUse">
      <path d="M0 9h28M9 0v20" stroke="#f0c073" stroke-width="3" stroke-opacity=".55"/>
    </pattern>
  </defs>

  <rect width="760" height="650" fill="url(#back)"/>
  <circle cx="99" cy="100" r="56" fill="#fff" opacity=".25"/>
  <circle cx="692" cy="118" r="92" fill="#b9db55" opacity=".22"/>
  <circle cx="685" cy="560" r="145" fill="#fff" opacity=".15"/>
  <path d="M0 492c147-55 268-20 388 19 137 45 258 21 372-45v184H0V492Z" fill="#8bb99b" opacity=".28"/>
  <ellipse cx="401" cy="560" rx="291" ry="52" fill="#174430" opacity=".12"/>

  <!-- Bolsa reutilizable -->
  <g filter="url(#shadow)">
    <path d="M491 285h168l-13 268H507l-16-268Z" fill="url(#bag)"/>
    <path d="M530 298c2-77 84-77 88 0" fill="none" stroke="#b38d55" stroke-width="13" stroke-linecap="round"/>
    <path d="M531 302c2-62 71-62 75 0" fill="none" stroke="#dfc493" stroke-width="6" stroke-linecap="round"/>
    <path d="M520 405c30-35 83-35 114 0-13 35-42 56-57 62-18-8-45-28-57-62Z" fill="#2f8e5f" opacity=".94"/>
    <path d="M574 379c-1-27 14-43 38-46-1 26-13 43-38 46Z" fill="#82ad3c"/>
    <path d="M575 379c-19-19-38-20-55-7 14 20 32 26 55 7Z" fill="#b9db55"/>
  </g>

  <!-- Pan y hojas detrás de la canasta -->
  <g filter="url(#soft)">
    <path d="M209 381c-24-91 0-183 43-194 46-12 97 64 115 143 8 37-21 80-60 88-45 10-88-1-98-37Z" fill="#d5984e"/>
    <path d="M230 341c27-8 62-18 101-28M226 302c29-8 59-16 91-24M236 264c24-6 47-13 70-20" stroke="#f1c879" stroke-width="9" stroke-linecap="round"/>
    <path d="M329 350c-6-104 37-182 92-181 53 1 78 90 61 184-7 39-50 66-89 57-38-9-62-27-64-60Z" fill="#4b9555"/>
    <path d="M391 394c-3-93 5-157 31-210M389 305l-39-48M398 270l49-35M388 343l-40-36M400 316l52-37" fill="none" stroke="#9fd26a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Canasta -->
  <g filter="url(#shadow)">
    <path d="M136 357h369l-40 226H179l-43-226Z" fill="url(#basket)"/>
    <path d="M151 376h338l-5 35H157l-6-35Z" fill="#7d4d22"/>
    <path d="M172 410h309l-30 154H199l-27-154Z" fill="url(#weave)" opacity=".9"/>
    <path d="M180 400c2-116 57-179 142-179 81 0 140 66 143 179" fill="none" stroke="#8b5c2c" stroke-width="17" stroke-linecap="round"/>
    <path d="M196 396c3-97 50-158 126-158 72 0 123 62 127 158" fill="none" stroke="#e5b66c" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- Frutas y vegetales -->
  <g filter="url(#soft)">
    <ellipse cx="180" cy="348" rx="62" ry="55" fill="#87a93e" transform="rotate(-17 180 348)"/>
    <path d="M179 300c14-31 42-46 65-42-8 30-27 48-65 42Z" fill="#467a3b"/>
    <path d="M162 300c-26-21-52-21-69-6 19 25 42 29 69 6Z" fill="#6d9c47"/>

    <circle cx="246" cy="349" r="53" fill="url(#tomato)"/>
    <path d="M244 301c7 19 24 23 41 20-6 10-17 17-36 17-18 0-31-6-38-17 17 2 26-5 33-20Z" fill="#3c823d"/>
    <path d="m247 305-2-24" stroke="#386f35" stroke-width="6" stroke-linecap="round"/>

    <ellipse cx="330" cy="342" rx="46" ry="66" fill="#4c7739" transform="rotate(9 330 342)"/>
    <ellipse cx="330" cy="345" rx="36" ry="54" fill="#8fac45" transform="rotate(9 330 345)"/>
    <circle cx="337" cy="355" r="20" fill="#a96f3a"/>

    <circle cx="402" cy="345" r="52" fill="url(#orange)"/>
    <circle cx="383" cy="324" r="7" fill="#ffe691" opacity=".75"/>
    <path d="M402 297c13-24 37-28 51-19-10 24-27 32-51 19Z" fill="#569346"/>

    <path d="M425 317c39-52 80-56 110-24-4 49-30 81-85 89-25-12-35-35-25-65Z" fill="#e9bf33" transform="rotate(7 480 336)"/>
    <path d="M500 288c-8-48 9-73 43-83 10 32-4 59-43 83ZM500 288c24-40 53-51 82-31-16 31-43 42-82 31ZM500 288c-39-21-50-46-36-75 32 11 46 35 36 75Z" fill="#4a863e"/>
    <path d="m455 325 58 42M465 307l58 42M445 347l50 37" stroke="#c98b27" stroke-width="4" opacity=".75"/>

    <path d="M106 396c44-7 85 15 99 56-37 24-81 20-115-15 1-19 5-31 16-41Z" fill="#82ac45"/>
    <path d="M106 400c20 10 50 27 86 48M117 414l4 24M144 426l4 29M164 432l1 25" fill="none" stroke="#c0d869" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Productos de despensa sin marca -->
  <g filter="url(#soft)">
    <rect x="365" y="412" width="71" height="108" rx="7" fill="#f8dfad"/>
    <rect x="371" y="424" width="59" height="74" rx="4" fill="#fff9e9"/>
    <path d="M379 469c18-27 31-26 44 0-17 12-29 12-44 0Z" fill="#b56a35"/>
    <circle cx="401" cy="450" r="13" fill="#e9c858"/>
    <path d="M368 411h65l-7-18h-52l-6 18Z" fill="#d4ad68"/>

    <rect x="446" y="424" width="57" height="96" rx="7" fill="#dbe6df"/>
    <rect x="452" y="440" width="45" height="41" rx="3" fill="#f7f3e8"/>
    <path d="M461 459h27M466 467h18" stroke="#6b9e79" stroke-width="4" stroke-linecap="round"/>
    <path d="M446 441h57" stroke="#87a994" stroke-width="7"/>
  </g>

  <!-- Detalles decorativos -->
  <g fill="none" stroke="#fff" stroke-linecap="round" opacity=".65">
    <path d="M104 174c18-22 42-27 65-14" stroke-width="7"/>
    <path d="M621 181c17-19 34-26 55-19" stroke-width="6"/>
    <path d="M74 221c9-5 17-5 25 0" stroke-width="5"/>
  </g>
</svg>
